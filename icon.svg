<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="mchub-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1420"/>
      <stop offset="1" stop-color="#1a2338"/>
    </linearGradient>
    <linearGradient id="mchub-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#mchub-bg)"/>
  <g transform="translate(20 20)">
    <!-- MC block silhouette -->
    <rect x="0" y="8" width="80" height="80" rx="8" fill="url(#mchub-accent)"/>
    <rect x="8" y="16" width="24" height="24" fill="#052e14" opacity=".35"/>
    <rect x="40" y="16" width="16" height="24" fill="#052e14" opacity=".25"/>
    <rect x="8" y="48" width="16" height="16" fill="#052e14" opacity=".3"/>
    <rect x="32" y="48" width="40" height="16" fill="#052e14" opacity=".15"/>
    <rect x="8" y="72" width="64" height="8" fill="#052e14" opacity=".2"/>
  </g>
  <!-- gear -->
  <g transform="translate(78 78)" fill="#f8fafc" opacity=".95">
    <circle cx="16" cy="16" r="14" fill="#0e1420" stroke="#4ade80" stroke-width="2"/>
    <circle cx="16" cy="16" r="5" fill="#4ade80"/>
    <g stroke="#4ade80" stroke-width="2">
      <line x1="16" y1="1" x2="16" y2="6"/>
      <line x1="16" y1="26" x2="16" y2="31"/>
      <line x1="1" y1="16" x2="6" y2="16"/>
      <line x1="26" y1="16" x2="31" y2="16"/>
      <line x1="5" y1="5" x2="9" y2="9"/>
      <line x1="23" y1="23" x2="27" y2="27"/>
      <line x1="27" y1="5" x2="23" y2="9"/>
      <line x1="5" y1="27" x2="9" y2="23"/>
    </g>
  </g>
