<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="dirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#92400e"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
  </defs>

  <rect width="128" height="128" rx="26" fill="url(#bg)"/>

  <!-- grass block -->
  <g transform="translate(20 26)">
    <rect x="0" y="0" width="56" height="56" rx="8" fill="url(#dirt)"/>
    <path d="M0 8 a8 8 0 0 1 8 -8 h40 a8 8 0 0 1 8 8 v12 h-56 z" fill="url(#grass)"/>
    <!-- pixel details -->
    <rect x="8" y="14" width="8" height="8" fill="#15803d" opacity="0.75"/>
    <rect x="26" y="10" width="8" height="8" fill="#86efac" opacity="0.6"/>
    <rect x="42" y="15" width="7" height="7" fill="#15803d" opacity="0.7"/>
    <rect x="10" y="32" width="9" height="9" fill="#a16207" opacity="0.65"/>
    <rect x="30" y="38" width="9" height="9" fill="#451a03" opacity="0.5"/>
    <rect x="44" y="30" width="7" height="7" fill="#a16207" opacity="0.55"/>
  </g>

  <!-- sliders card -->
  <g transform="translate(58 62)">
    <rect x="0" y="0" width="52" height="46" rx="10" fill="#0ea5e9" opacity="0.14"/>
    <rect x="0.75" y="0.75" width="50.5" height="44.5" rx="9.25" fill="none" stroke="#38bdf8" stroke-opacity="0.5" stroke-width="1.5"/>
    <g stroke-linecap="round">
      <line x1="9" y1="12" x2="43" y2="12" stroke="#334155" stroke-width="4"/>
      <line x1="9" y1="12" x2="30" y2="12" stroke="#38bdf8" stroke-width="4"/>
      <circle cx="30" cy="12" r="5" fill="#f8fafc"/>
      <line x1="9" y1="23" x2="43" y2="23" stroke="#334155" stroke-width="4"/>
      <line x1="9" y1="23" x2="17" y2="23" stroke="#4ade80" stroke-width="4"/>
      <circle cx="17" cy="23" r="5" fill="#f8fafc"/>
      <line x1="9" y1="34" x2="43" y2="34" stroke="#334155" stroke-width="4"/>
      <line x1="9" y1="34" x2="38" y2="34" stroke="#fbbf24" stroke-width="4"/>
      <circle cx="38" cy="34" r="5" fill="#f8fafc"/>
    </g>
  </g>
</svg>
