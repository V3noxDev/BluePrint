<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="55%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect width="128" height="64" rx="28" fill="url(#shine)"/>
  <!-- slider lines -->
  <g stroke="#ffffff" stroke-width="8" stroke-linecap="round">
    <line x1="30" y1="40" x2="98" y2="40"/>
    <line x1="30" y1="64" x2="98" y2="64"/>
    <line x1="30" y1="88" x2="98" y2="88"/>
  </g>
  <!-- slider knobs -->
  <g fill="#064e3b" stroke="#ffffff" stroke-width="6">
    <circle cx="48" cy="40" r="10"/>
    <circle cx="82" cy="64" r="10"/>
    <circle cx="58" cy="88" r="10"/>
  </g>
</svg>
